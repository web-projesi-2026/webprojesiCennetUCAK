<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İletişim | Uçak Yazılım</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="header">
  <div class="container nav-container">
    <a href="../index.html" class="logo">UÇAK YAZILIM</a>

    <nav class="nav">
      <a href="../index.html">Anasayfa</a>
      <a href="iletisim.html" class="active">İletişim</a>
    </nav>
  </div>
</header>

<section class="section">
  <div class="container">

    <div class="section-head">
      <h2>İletişime Geç</h2>
      <p>Bizimle iletişime geçmek için formu doldurun</p>
    </div>

    <form id="contactForm" class="contact-form">

      <input type="text" id="name" placeholder="Ad Soyad" required>

      <input type="email" id="email" placeholder="E-posta" required>

      <input type="text" id="phone" placeholder="Telefon" required>

      <select id="service" required>
        <option value="">Hizmet Seçiniz</option>
        <option>Yazılım Geliştirme</option>
        <option>Otomasyon</option>
        <option>Danışmanlık</option>
      </select>

      <textarea id="message" placeholder="Proje açıklaması" required></textarea>

      <label>
        <input type="checkbox" id="kvkk" required> KVKK onaylıyorum
      </label>

      <button type="submit" class="btn btn-primary">Gönder</button>

      <p id="formMessage"></p>

    </form>

  </div>
</section>

<script src="../assets/js/main.js"></script>
</body>
</html>
